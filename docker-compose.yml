version: '3.8'

services:
  # n8n Workflow Automation Engine
  n8n:
    image: n8nio/n8n:latest
    container_name: secureflow-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-secureflow2026}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=${POSTGRES_PORT:-5432}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-secureflow}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-secureflow}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-secureflow_password}
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=${REDIS_PORT:-6379}
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD:-secureflow_redis_2026}
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_METRICS=true
      - N8N_LOG_LEVEL=info
    volumes:
      - ./workflows:/home/node/.n8n/workflows
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
      - redis
    networks:
      - secureflow-network

  # PostgreSQL Database for Audit Logs
  postgres:
    image: postgres:15-alpine
    container_name: secureflow-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5434:5432"  # Bind to localhost only, use 5434 to avoid conflicts
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-secureflow}
      - POSTGRES_USER=${POSTGRES_USER:-secureflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secureflow_password}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/audit-schema.sql:/docker-entrypoint-initdb.d/02-audit-schema.sql
    networks:
      - secureflow-network

  # Redis for Message Queuing
  redis:
    image: redis:7-alpine
    container_name: secureflow-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"  # Bind to localhost only for security
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-secureflow_redis_2026}
    volumes:
      - redis_data:/data
    networks:
      - secureflow-network

  # Mock Threat Intelligence APIs
  mock-apis:
    build:
      context: ./mock-apis
      dockerfile: Dockerfile
    container_name: secureflow-mock-apis
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-demo_virustotal_key_2026}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-demo_abuseipdb_key_2026}
      - SHODAN_API_KEY=${SHODAN_API_KEY:-demo_shodan_key_2026}
      - VECTORGUARD_API_KEY=${VECTORGUARD_API_KEY:-demo_vectorguard_key_2026}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-secureflow_webhook_secret_2026}
    volumes:
      - ./mock-apis:/app
    networks:
      - secureflow-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: secureflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - n8n
      - mock-apis
    networks:
      - secureflow-network

  # Prometheus Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: secureflow-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - secureflow-network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: secureflow-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=secureflow2026
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - secureflow-network

volumes:
  n8n_data:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  secureflow-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16